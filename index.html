<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/output.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Pacifico&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap&family=Roboto+Slab:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>SkyMist — Weather Forecast</title>
  </head>

  <body class="bg-day">
    <!-- Toast  -->
    <div
      id="toast"
      class="hidden fixed bottom-4 right-4 sm:bottom-6 sm:right-6 z-50 bg-[#1a1a2e] text-white rounded-2xl px-5 py-4 max-w-[300px] w-[90vw] sm:w-auto border border-red-500/40 shadow-2xl flex flex-col gap-1"
    >
      <!-- Close button -->
      <span
        onclick="closeToast()"
        class="absolute top-3 right-4 cursor-pointer opacity-50 hover:opacity-100 transition-opacity text-sm"
        >✕</span
      >

      <!-- Title -->
      <div class="font-playfair font-bold text-red-400 text-sm pr-4">Oops!</div>

      <!-- Message -->
      <div id="toastMsg" class="text-white/70 text-sm"></div>
    </div>

    <!-- ══════════════════════════════════
         MAIN WRAPPER
        ══════════════════════════════════ -->
    <div
      class="relative z-2 max-w-[1100px] m-auto px-4 sm:px-6 py-6 min-h-[100vh]"
    >
      <!-- ══════════════════════════════════
           HEADER
      ══════════════════════════════════ -->
      <header
        class="w-full flex flex-col md:flex-row md:justify-between md:items-end mb-10"
      >
        <!-- Logo + tagline -->
        <div>
          <div
            class="pacifico-regular text-4xl md:text-2xl lg:text-3xl"
            id="name"
          >
            <em class="text-[var(--accent)]">Sky</em>Mist
          </div>
          <div
            class="uppercase text-[var(--muted)] mt-2 tracking-[.25em] font-semibold text-xs transition-colors duration-700"
          >
            Your sky, at a Glance
          </div>
        </div>

        <!-- Clock + date -->
        <div class="flex flex-col md:items-end mt-3 md:mt-0">
          <div
            id="liveTime"
            class="font-playfair text-[var(--text)] transition-colors duration-700 text-xl"
          ></div>
          <div
            id="liveDate"
            class="mt-0.5 tracking-[2px] uppercase text-[var(--muted)] transition-colors duration-700 text-[10px] md:text-xs"
          ></div>
        </div>
      </header>

      <!-- ══════════════════════════════════
           SEARCH BOX
      ══════════════════════════════════ -->
      <main>
        <div
          class="bg-[var(--card-bg)] rounded-2xl px-5 pt-6 pb-7 border-2 border-[var(--card-border)] transition-colors duration-700"
        >
          <!-- Input + dropdown wrapper -->
          <div class="relative">
            <input
              class="w-full bg-transparent border-none outline-none font-playfair text-[var(--text)] text-xl caret-[var(--accent)] placeholder:text-[var(--muted)] placeholder:italic transition-colors duration-700"
              id="searchInput"
              type="text"
              placeholder="Search any city in the world…"
              autocomplete="off"
            />

            <!-- Dropdown — hidden by default, JS toggles .hidden -->
            <div
              id="dropDownList"
              class="hidden absolute left-0 right-0 top-full mt-2 z-50 bg-[var(--dd-bg)] border border-[var(--card-border)] rounded-2xl overflow-hidden shadow-2xl backdrop-blur-md max-h-60 overflow-y-auto"
            >
              <!-- JS injects .dd-item divs here -->
            </div>
          </div>

          <!-- Divider -->
          <div
            class="h-[1px] bg-[var(--card-border)] mt-3 mb-5 transition-colors duration-700"
          ></div>

          <!-- Buttons + recent cities -->
          <div class="flex flex-row gap-2 flex-wrap items-center">
            <!-- Search + Location (always same row) -->
            <div class="flex gap-2 flex-shrink-0">
              <button
                id="searchBtn"
                onclick="citySearch()"
                class="bg-[var(--accent)] text-white py-2 px-4 rounded-xl font-outfit text-sm cursor-pointer tracking-wide transition-all duration-200 ease-in-out hover:scale-105 hover:opacity-85 flex items-center gap-1.5"
              >
                <i class="fa-solid fa-magnifying-glass text-xs"></i> Search
              </button>
              <button
                onclick="myLocation()"
                id="locationBtn"
                class="bg-transparent text-[var(--accent)] py-[7px] px-4 rounded-xl border-2 border-[var(--accent)] font-outfit text-sm cursor-pointer tracking-wide transition-all duration-200 ease-in-out hover:opacity-75 hover:scale-105 flex items-center gap-1.5"
              >
                <i class="fa-solid fa-crosshairs text-xs"></i> My Location
              </button>
            </div>

            <!-- Recent cities -->
            <div
              id="recentWrapper"
              class="flex flex-row gap-2 w-full md:w-auto md:flex-1 md:justify-end flex-wrap"
            >
              <!-- JS injects .recentCityName  here -->
            </div>
          </div>
        </div>

        <!-- ══════════════════════════════════
           WEATHER ALERT
      ══════════════════════════════════ -->
        <div
          id="alertBar"
          class="hidden bg-gradient-to-br from-[#f2cce1] to-[#e7d5df] mt-6 rounded-2xl px-5 py-4 border border-[var(--accent)] flex items-center gap-2"
        >
          <span class="text-lg" id="alertIcon">⚠️</span>
          <span class="text-[var(--accent)] font-medium" id="alertTxt">
            Showing weather alert here!
          </span>
        </div>

        <!-- ══════════════════════════════════
           CURRENT WEATHER SECTION
      ══════════════════════════════════ -->
        <div class="mt-8">
          <div
            class=" flex flex-col lg:flex-row justify-between items-start gap-4"
          >
            <!-- City + country -->
            <div class="flex items-center gap-2">
              <span
                class="font-playfair text-[var(--text)] text-4xl lg:text-7xl"
                id="city"
              >
                New<em class="text-[var(--accent)]">York</em>
              </span>
              <span
                id="country"
                class="font-roboto text-lg lg:text-2xl text-[var(--muted)] font-bold"
              >
                US
              </span>
            </div>

            <!-- Temp + icon + unit toggle -->
            <div class="flex flex-col w-full lg:w-auto">
              <div
                class="flex flex-row justify-between items-center w-full gap-4"
              >
                <!-- Left: icon + condition name -->
                <div class="flex gap-2 items-center">
                  <div class="text-4xl" id="condIcon">☀️</div>
                  <div
                    class="font-playfair text-2xl transition-colors duration-700"
                    id="condName"
                  >
                    Sunny
                  </div>
                </div>

                <!-- Right: temperature -->
                <div
                  class="font-playfair font-extrabold text-[var(--text)] text-7xl sm:text-8xl transition-colors duration-700"
                  id="tempDisplay"
                >
                  97°
                </div>
              </div>

              <!-- Unit toggle -->
              <div class="flex mt-3 justify-end gap-3">
                <button
                  id="btnC"
                  onclick="setUnit('C')"
                  class="u-btn active py-1 px-3 rounded-2xl text-sm"
                >
                  °C
                </button>
                <button
                  id="btnF"
                  onclick="setUnit('F')"
                  class="u-btn py-1 px-3 rounded-2xl text-sm"
                >
                  °F
                </button>
              </div>
            </div>
          </div>

          <!-- Weather stats row -->
          <div
            class="flex gap-3 items-center md:justify-end flex-wrap mt-10"
          >
            <div class="weather-stat">
              <span><i class="fa-brands fa-drupal"></i></span>
              <span class="text-[var(--text-1)]">Humidity</span>
              <span id="wH">6%</span>
            </div>
            <div class="weather-stat">
              <span><i class="fa-solid fa-wind"></i></span>
              <span>Wind</span>
              <span id="wW">4.55 m/s </span>
            </div>
            <div class="weather-stat" >
              <span><i class="fa-solid fa-temperature-half"></i></span>
              <span>Feels like</span>
              <span id="wF">34°C</span>
            </div>
            <div class="weather-stat" >
              <span><i class="fa-regular fa-eye"></i> </span>
              <span> Visibility</span>
              <span id="wV">10.0 km</span>
            </div>
            <div class="weather-stat">
              <span><i class="fa-solid fa-bolt"></i> </span>
              <span> Pressure</span>
              <span  id="wP">101 hPa</span>
            </div>
          </div>
        </div>

        <!-- ══════════════════════════════════
           5 - DAY WEATHER SECTION
      ══════════════════════════════════ -->
        <div class="mt-10 flex flex-col">
          <div class="font-outfit pb-5 text-lg text-[var(--accent)]">
            5 - DAY FORECAST
          </div>
          <div class="fc-grid" id="fcGrid"></div>
        </div>
      </main>
    </div>
    <!-- /main wrapper -->

    <!-- ══════════════════════════════════
         LOADER OVERLAY
         fixed — lives outside main wrapper
    ══════════════════════════════════ -->
    <div
      id="loader"
      class="hidden fixed inset-0 z-50 flex items-center justify-center backdrop-blur-sm bg-black/20"
    >
      <div class="flex flex-col items-center gap-3">
        <div
          class="w-12 h-12 rounded-full border-4 border-[var(--card-border)] border-t-[var(--accent)] animate-spin"
        ></div>
        <p
          class="text-[var(--text)] font-outfit text-sm tracking-widest uppercase transition-colors duration-700"
        >
          Fetching sky data…
        </p>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
